name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK with EAS
        run: |
          BUILD_RESULT=$(eas build --platform android --profile preview \
            --non-interactive --wait --json)
          echo "EAS build output: $BUILD_RESULT"
          BUILD_URL=$(echo "$BUILD_RESULT" | jq -r '.[0].artifacts.buildUrl')
          if [ -z "$BUILD_URL" ] || [ "$BUILD_URL" = "null" ]; then
            echo "ERROR: Could not extract build URL from EAS output"
            echo "$BUILD_RESULT"
            exit 1
          fi
          echo "Downloading APK from: $BUILD_URL"
          mkdir -p artifacts
          curl -fL "$BUILD_URL" -o artifacts/lockbox-local-${{ github.ref_name }}.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: artifacts/lockbox-local-${{ github.ref_name }}.apk

  build-ios:
    name: Build iOS IPA
    runs-on: ubuntu-latest
    # Requires Apple credentials configured in EAS (run: eas credentials --platform ios)
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS simulator app with EAS
        run: |
          BUILD_RESULT=$(eas build --platform ios --profile preview \
            --non-interactive --wait --json)
          echo "EAS build output: $BUILD_RESULT"
          BUILD_URL=$(echo "$BUILD_RESULT" | jq -r '.[0].artifacts.buildUrl')
          if [ -z "$BUILD_URL" ] || [ "$BUILD_URL" = "null" ]; then
            echo "ERROR: Could not extract build URL from EAS output"
            echo "$BUILD_RESULT"
            exit 1
          fi
          echo "Downloading simulator build from: $BUILD_URL"
          mkdir -p artifacts
          curl -fL "$BUILD_URL" -o artifacts/lockbox-local-simulator-${{ github.ref_name }}.tar.gz
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload iOS simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator
          path: artifacts/lockbox-local-simulator-${{ github.ref_name }}.tar.gz

  release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    if: always() && needs.build-android.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            VERSION="${{ steps.version.outputs.VERSION }}"
            NOTES=$(awk "/^## \[?v?${VERSION}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
            if [ -z "$NOTES" ]; then
              NOTES="Release ${{ github.ref_name }}"
            fi
            echo "NOTES<<EOF" >> $GITHUB_OUTPUT
            echo "$NOTES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "NOTES=Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/

      - name: Download iOS simulator build
        if: needs.build-ios.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: ios-simulator
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Lockbox Local ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.NOTES }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
